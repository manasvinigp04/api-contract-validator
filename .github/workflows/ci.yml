name: API Contract Validator CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        python -m spacy download en_core_web_sm

    - name: Run linting
      run: |
        ruff check src/ tests/

    - name: Run type checking
      run: |
        mypy src/

    - name: Run tests with coverage
      run: |
        pytest --cov=api_contract_validator --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  validate-api:
    name: API Contract Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install API Contract Validator
      run: |
        pip install -e .
        python -m spacy download en_core_web_sm

    - name: Start mock API server
      run: |
        python examples/mock_apis/users_api.py &
        sleep 5

    - name: Validate API contract
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        acv validate examples/openapi/sample_users_api.yaml \
          --api-url http://localhost:5000 \
          --output-dir ./reports

    - name: Upload validation reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-reports
        path: ./reports/

    - name: Check for critical drift
      run: |
        if [ -f ./reports/drift_report.json ]; then
          CRITICAL_COUNT=$(jq '.summary.critical_count' ./reports/drift_report.json)
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Critical drift detected: $CRITICAL_COUNT issues"
            exit 1
          fi
          echo "✅ No critical drift detected"
        fi

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check distribution
      run: twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
